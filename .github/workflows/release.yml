name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AUTH_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build release binaries
        run: |
          cargo build --release
          cargo build --release -p emulator
          cargo build --release -p serial

      - name: Build Debian package
        run: ./packaging/build-deb.sh --skip-build

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: gh release upload ${{ github.ref_name }} *.deb --clobber

      - name: Bump minor version on main
        run: |
          # Parse current version from Cargo.toml
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEXT="${MAJOR}.$((MINOR + 1)).0"

          echo "Bumping ${CURRENT} → ${NEXT}"
          sed -i "s/^version = \"${CURRENT}\"/version = \"${NEXT}\"/" Cargo.toml

          # Update Cargo.lock to reflect the new version
          cargo check --quiet

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version ${CURRENT} → ${NEXT} [skip ci]"
          git push origin main
